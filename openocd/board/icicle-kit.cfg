# PolarFire SoC Icicle Kit -- Board Configuration (Main Entry)
#
# This is the main entry point for OpenOCD. Pass to OpenOCD via -f:
#
#   Linux:
#     SC_INSTALL_DIR="/opt/microchip/SoftConsole"
#     LD_LIBRARY_PATH=${SC_INSTALL_DIR}/openocd/lib:${SC_INSTALL_DIR}/fpServer/lib \
#     ${SC_INSTALL_DIR}/openocd/bin/openocd \
#       -s ${SC_INSTALL_DIR}/openocd/share/openocd/scripts \
#       -s $(pwd)/openocd \
#       -f board/icicle-kit.cfg
#
#   Windows (PowerShell):
#     $env:SC_INSTALL_DIR="D:/Microchip/SoftConsole-v2022.2-RISC-V-747"
#     $env:PATH = "$env:SC_INSTALL_DIR/openocd/bin;$env:PATH"
#     $env:LD_LIBRARY_PATH = "$env:SC_INSTALL_DIR/openocd/lib;$env:SC_INSTALL_DIR/fpServer/lib"
#     openocd -s "$env:SC_INSTALL_DIR/openocd/share/openocd/scripts" `
#             -s openocd `
#             -f board/icicle-kit.cfg
#
# To debug a specific hart, set HART before sourcing:
#   openocd ... -c "set HART 1" -f board/icicle-kit.cfg

# Maximum number of flash programming errors
set _FLASH_ERROR_LIMIT 2

# Step 1: FlashPro5/6 interface (sets DEVICE=MPFS)
source [find interface/flashpro5.cfg]

# Step 2: SoftConsole board-level script (FPGA config + JTAG probe + target init)
#         This must come from SoftConsole's script search path (-s <path>)
source [find board/microsemi-riscv.cfg]

# Step 3: Project-specific target helpers (memory map, procs, etc.)
source [find target/mpfs250t.cfg]

# Step 4: GDB configuration
gdb_report_data_abort enable
gdb_memory_map enable
gdb_breakpoint_override hard

# Step 5: Board identification
puts "==========================================================="
puts "Icicle Kit (MPFS250T) -- HART=$HART ($TARGET_ACTIVE)"
puts "DDR code region: 0x91800000 - 0x919FFFFF"
puts "Debug scripts:   openocd/scripts/"
puts "==========================================================="


