# PolarFire SoC Icicle Kit -- FlashPro5/6 Interface Configuration
#
# FlashPro5/6 uses Microchip-proprietary protocol over USB HID.
# Only SoftConsole-bundled OpenOCD supports it via fpServer library.
#
# This file sets the required device flag. Actual interface and target
# init is done by SoftConsole's board/microsemi-riscv.cfg (sourced
# from board/icicle-kit.cfg).
#
# NOTE: In OpenOCD 0.10.x (SoftConsole build), there is no generic
# "adapter name" command. FlashPro interface is set up internally
# by SoftConsole OpenOCD when DEVICE=MPFS is set.
#
# Environment:
#   SC_INSTALL_DIR -- SoftConsole installation directory

# Required flag: tells SoftConsole OpenOCD to use PolarFire SoC JTAG
set DEVICE MPFS
