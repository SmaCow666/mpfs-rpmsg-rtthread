# Flash (Program) U54_1 ? Load ELF to DDR via JTAG
#
# Source this AFTER board config is loaded:
#   openocd ... -c "set HART 1" -f board/icicle-kit.cfg -f scripts/flash-hart1.cfg
#
# Or run manually from GDB:
#   (gdb) target remote localhost:3333
#   (gdb) monitor reset halt
#   (gdb) monitor mpfs_program D:/XuHuiNiu/CodeData/MPFS250T/polarfire-rtthread/Master-Default/mpfs-rpmsg-master.elf
#   (gdb) monitor mpfs_verify  D:/XuHuiNiu/CodeData/MPFS250T/polarfire-rtthread/Master-Default/mpfs-rpmsg-master.elf
#   (gdb) continue

# Target is U54_1
set HART 1
set _TARGET $TARGET_U54_1

# Verify target exists
if { [catch { $_TARGET curpc }] } {
    puts "ERROR: Target $_TARGET not probed. Check connections."
    shutdown
}

puts "================================================"
puts "Flashing U54_1 (HART 1) via JTAG..."
puts "Target:  $_TARGET"
puts "Address: 0x91800000 (DDR)"
puts "ELF:     D:/XuHuiNiu/CodeData/MPFS250T/polarfire-rtthread/Master-Default/mpfs-rpmsg-master.elf"
puts "================================================"

# Reset and halt
reset halt
puts "Target halted at PC=[$_TARGET curpc]"

# Program ELF to DDR
mpfs_program D:/XuHuiNiu/CodeData/MPFS250T/polarfire-rtthread/Master-Default/mpfs-rpmsg-master.elf

# Verify
mpfs_verify D:/XuHuiNiu/CodeData/MPFS250T/polarfire-rtthread/Master-Default/mpfs-rpmsg-master.elf

puts "================================================"
puts "Flash complete! Type 'continue' to run."
puts "================================================"

