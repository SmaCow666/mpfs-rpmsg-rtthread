# Debug U54_1 ? GDB Connect + Symbol Load
#
# Source this AFTER board config is loaded:
#   openocd ... -c "set HART 1" -f board/icicle-kit.cfg -f scripts/debug-hart1.cfg
#
# Or run from GDB session:
#   (gdb) target remote localhost:3333
#   (gdb) monitor reset halt
#   (gdb) load Master-Default/mpfs-rpmsg-master.elf
#   (gdb) continue

# Ensure we"re on U54_1
set HART 1
set _TARGET $TARGET_U54_1

puts "Debug: U54_1 (HART 1)"
puts "Debug: target=$_TARGET"

# Halt the target
$_TARGET arp_halt
puts "Debug: U54_1 halted at PC=[$_TARGET curpc]"

# GDB will connect to port 3331 by convention
# (OpenOCD default is 3333 for the first target)
targets $_TARGET

