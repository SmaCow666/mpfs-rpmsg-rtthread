# Debug U54_2 ? GDB Connect + Symbol Load
#
# Source this AFTER board config is loaded:
#   openocd ... -c "set HART 2" -f board/icicle-kit.cfg -f scripts/debug-hart2.cfg
#
# Or run from GDB session (after switching to hart 2):
#   (gdb) monitor targets riscv.cpu2
#   (gdb) target remote localhost:3333
#   (gdb) monitor reset halt
#   (gdb) load Remote-Default/mpfs-rpmsg-remote.elf
#   (gdb) continue

# Ensure we"re on U54_2
set HART 2
set _TARGET $TARGET_U54_2

puts "Debug: U54_2 (HART 2)"
puts "Debug: target=$_TARGET"

# Halt the target
$_TARGET arp_halt
puts "Debug: U54_2 halted at PC=[$_TARGET curpc]"

# Switch target context
targets $_TARGET

