# PolarFire SoC MPFS250T -- Target Helper Configuration
#
# SoftConsole's board/microsemi-riscv.cfg creates targets automatically.
# This file provides project-specific target utilities:
#   - Target naming and aliases
#   - Memory region definitions
#   - Helper procedures for debug and flash
#
# Target naming (created by SoftConsole OpenOCD):
#   riscv.cpu0  -- E51 (hart 0)
#   riscv.cpu1  -- U54_1 (hart 1, RT-Thread Master)
#   riscv.cpu2  -- U54_2 (hart 2, RT-Thread Remote)
#   riscv.cpu3  -- U54_3 (hart 3)
#   riscv.cpu4  -- U54_4 (hart 4)

# Target hart selection: 1 = U54_1 (default)
if { [info exists HART] == 0 } {
    set HART 1
}

# Named aliases for each target (for human readability)
set TARGET_E51   riscv.cpu0
set TARGET_U54_1 riscv.cpu1
set TARGET_U54_2 riscv.cpu2
set TARGET_U54_3 riscv.cpu3
set TARGET_U54_4 riscv.cpu4

# Active target (selected via HART)
switch -exact $HART {
    0 { set TARGET_ACTIVE $TARGET_E51 }
    1 { set TARGET_ACTIVE $TARGET_U54_1 }
    2 { set TARGET_ACTIVE $TARGET_U54_2 }
    3 { set TARGET_ACTIVE $TARGET_U54_3 }
    4 { set TARGET_ACTIVE $TARGET_U54_4 }
    default {
        error "Invalid HART: $HART (valid: 0-4)"
    }
}

# Memory regions
set MEM_DDR_CACHED    0x91800000
set MEM_DDR_CACHED_END 0x919FFFFF
set MEM_DDR_NONCACHED 0xC0000000
set MEM_ITIM_U54_1    0x01808000
set MEM_L2LIM         0x08000000
set MEM_ENVM          0x20220100

# Program entry address (RT-Thread runs from DDR, loaded by bootloader)
set MEM_APP_ENTRY $MEM_DDR_CACHED

# Helper: reset and halt the target
proc mpfs_reset_halt { } {
    global TARGET_ACTIVE
    puts "MPFS: resetting and halting $TARGET_ACTIVE..."
    reset halt
    puts "MPFS: target halted at PC=[$TARGET_ACTIVE curpc]"
}

# Helper: load ELF to DDR via JTAG
proc mpfs_program { elf_path } {
    global MEM_APP_ENTRY TARGET_ACTIVE
    puts "MPFS: programming $elf_path to DDR @ $MEM_APP_ENTRY ..."
    program $elf_path $MEM_APP_ENTRY
    puts "MPFS: programming done"
}

# Helper: verify loaded image (CRC check via GDB)
proc mpfs_verify { elf_path } {
    global MEM_APP_ENTRY
    verify_image $elf_path $MEM_APP_ENTRY
}

puts "MPFS250T: HART=$HART, target=$TARGET_ACTIVE, entry=[format 0x%08x $MEM_APP_ENTRY]"



