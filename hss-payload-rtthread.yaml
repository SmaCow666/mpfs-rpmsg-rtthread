#
# HSS Payload Generator - RT-Thread RPMsg
#

set-name: "PolarFire-SoC-HSS::RT-Thread"

#
# Entry points for each hart
# Our RT-Thread firmware runs on U54_4 as the first application hart
#
hart-entry-points:
  {
    u54_1: "0x91800000",
    u54_2: "0x00000000",
    u54_3: "0x00000000",
    u54_4: "0x00000000",
  }

#
# Payload: RT-Thread RPMsg application
#
payloads:
  Master-Default/mpfs-rpmsg-master.elf:
    {
      exec-addr: "0x91800000",
      owner-hart: u54_1,
      priv-mode: prv_m,
      skip-opensbi: true,
    }
